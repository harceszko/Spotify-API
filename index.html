<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="felso-navigacio">
        <div class="nav-bal-oldal">
            <div class="spotify-logo"><i class="fab fa-spotify"></i></div>
            <div class="kezdolap-ikon"><i class="fas fa-home"></i></div>
            <div class="kereso-sav-keret">
                <i class="fas fa-search kereso-ikon"></i>
                <input type="text" placeholder="Mit szeretnél lejátszani?">
                <div class="kis-elvalaszto"></div>
                <i class="fas fa-briefcase taska-ikon"></i>
            </div>
        </div>
        
        <div class="nav-jobb-oldal">
            <div class="nav-linkek">
                <span>Premium</span>
                <span>Támogatás</span>
                <span>Letöltés</span>
            </div>
            <div class="nav-elvalaszto"></div>
            <div class="nav-bejelentkezes">
                <span class="telepites"><i class="far fa-arrow-alt-circle-down"></i> Alkalmazás telepítése</span>
                <span class="regisztracio-szoveg">Regisztráció</span>
                <button class="gomb-bejelentkezes">Bejelentkezés</button>
            </div>
        </div>
    </header>
</body>
</html>
